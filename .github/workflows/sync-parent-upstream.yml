name: sync-parent-upstream

on:
  workflow_dispatch:
    inputs:
      upstream_repository:
        description: "Upstream repository to sync from"
        required: true
        default: "stellarlinkco/codex"
        type: string
      upstream_branch:
        description: "Upstream branch to sync from"
        required: true
        default: "main"
        type: string
      auto_merge:
        description: "Enable PR auto-merge after checks pass"
        required: true
        default: false
        type: boolean
  schedule:
    - cron: "0 3 * * *"

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    if: ${{ github.repository == 'wintsa123/codex-cn' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Merge upstream into sync branch
        id: merge
        shell: bash
        run: |
          set -euo pipefail

          upstream_repo="${{ github.event.inputs.upstream_repository }}"
          if [[ -z "${upstream_repo}" ]]; then
            upstream_repo="stellarlinkco/codex"
          fi

          upstream_branch="${{ github.event.inputs.upstream_branch }}"
          if [[ -z "${upstream_branch}" ]]; then
            upstream_branch="main"
          fi

          sync_branch="bot/sync-${upstream_repo//\//-}-${upstream_branch}"
          sync_branch="${sync_branch//[^a-zA-Z0-9._-]/-}"

          git remote add upstream "https://github.com/${upstream_repo}.git" 2>/dev/null || true
          git fetch origin main
          git fetch upstream "${upstream_branch}"

          git checkout -B "${sync_branch}" origin/main

          if ! git merge --no-ff --no-edit -X ours "upstream/${upstream_branch}"; then
            if git ls-files -u | grep -q .; then
              git ls-files -u | cut -f 2 | sort -u | while read -r file; do
                git checkout --ours -- "${file}"
                git add "${file}"
              done
              git commit --no-edit
            else
              echo "merge failed without unmerged files" >&2
              exit 1
            fi
          fi

          if git diff --quiet origin/main..HEAD; then
            echo "has_changes=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          git push --force-with-lease origin HEAD:"${sync_branch}"

          echo "has_changes=true" >> "${GITHUB_OUTPUT}"
          echo "sync_branch=${sync_branch}" >> "${GITHUB_OUTPUT}"
          echo "upstream_repo=${upstream_repo}" >> "${GITHUB_OUTPUT}"
          echo "upstream_branch=${upstream_branch}" >> "${GITHUB_OUTPUT}"

      - name: Create or update sync PR
        if: ${{ steps.merge.outputs.has_changes == 'true' }}
        id: pr
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const head = `${owner}:${process.env.SYNC_BRANCH}`;
            const base = "main";
            const title = `sync: ${process.env.UPSTREAM_REPO}@${process.env.UPSTREAM_BRANCH}`;
            const body = [
              "Automated upstream sync PR.",
              "",
              `- upstream: \`${process.env.UPSTREAM_REPO}\``,
              `- branch: \`${process.env.UPSTREAM_BRANCH}\``,
              "- conflict policy: prefer local changes on conflict to avoid overwriting Chinese customizations",
              "",
              "Review the non-conflicting upstream updates before merging."
            ].join("\n");

            const { data: pulls } = await github.rest.pulls.list({
              owner,
              repo,
              state: "open",
              head,
              base,
            });

            if (pulls.length > 0) {
              const pr = pulls[0];
              await github.rest.pulls.update({
                owner,
                repo,
                pull_number: pr.number,
                title,
                body,
              });
              core.setOutput("number", String(pr.number));
              core.setOutput("node_id", pr.node_id);
              return;
            }

            const { data: pr } = await github.rest.pulls.create({
              owner,
              repo,
              title,
              head: process.env.SYNC_BRANCH,
              base,
              body,
            });

            core.setOutput("number", String(pr.number));
            core.setOutput("node_id", pr.node_id);
        env:
          SYNC_BRANCH: ${{ steps.merge.outputs.sync_branch }}
          UPSTREAM_REPO: ${{ steps.merge.outputs.upstream_repo }}
          UPSTREAM_BRANCH: ${{ steps.merge.outputs.upstream_branch }}

      - name: Enable PR auto-merge
        if: ${{ steps.merge.outputs.has_changes == 'true' && steps.pr.outputs.node_id != '' && github.event.inputs.auto_merge == 'true' }}
        uses: actions/github-script@v8
        with:
          script: |
            await github.graphql(
              `mutation($pullRequestId: ID!) {
                enablePullRequestAutoMerge(input: {
                  pullRequestId: $pullRequestId,
                  mergeMethod: MERGE
                }) {
                  clientMutationId
                }
              }`,
              { pullRequestId: process.env.PR_NODE_ID }
            );
        env:
          PR_NODE_ID: ${{ steps.pr.outputs.node_id }}
