name: ci

on:
  pull_request: {}
  push: { branches: [main] }
  workflow_dispatch: {}

jobs:
  changed:
    name: Detect installer and hodexctl changes
    runs-on: ubuntu-latest
    outputs:
      installer: ${{ steps.detect.outputs.installer }}
      hodexctl: ${{ steps.detect.outputs.hodexctl }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Detect changed paths
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_sha='${{ github.event.pull_request.base.sha }}'
            head_sha='${{ github.event.pull_request.head.sha }}'
            mapfile -t files < <(git diff --name-only --no-renames "$base_sha" "$head_sha")
          else
            base_sha='${{ github.event.before }}'
            head_sha='${{ github.sha }}'
            if [[ -z "$base_sha" || "$base_sha" == "0000000000000000000000000000000000000000" ]]; then
              files=("scripts/install.ps1" "scripts/install.sh" "scripts/hodexctl/hodexctl.ps1" "scripts/hodexctl/hodexctl.sh" "README.md" "docs/install.md")
            else
              mapfile -t files < <(git diff --name-only --no-renames "$base_sha" "$head_sha")
            fi
          fi

          installer=false
          hodexctl=false
          for f in "${files[@]}"; do
            case "$f" in
              .github/workflows/ci.yml|README.md|scripts/install.ps1|scripts/install.sh) installer=true ;;
              .github/workflows/ci.yml|README.md|docs/install.md|scripts/install-hodexctl.ps1|scripts/install-hodexctl.sh|scripts/hodexctl/*) hodexctl=true ;;
            esac
          done

          echo "installer=$installer" >> "$GITHUB_OUTPUT"
          echo "hodexctl=$hodexctl" >> "$GITHUB_OUTPUT"

  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # stage_npm_packages.py requires DotSlash when staging releases.
      - uses: facebook/install-dotslash@v2
        if: ${{ github.repository == 'openai/codex' }}

      - name: Stage npm package
        id: stage_npm_package
        if: ${{ github.repository == 'openai/codex' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Use a rust-release version that includes all native binaries.
          CODEX_VERSION=0.74.0
          OUTPUT_DIR="${RUNNER_TEMP}"
          python3 ./scripts/stage_npm_packages.py \
            --release-version "$CODEX_VERSION" \
            --package codex \
            --output-dir "$OUTPUT_DIR"
          PACK_OUTPUT="${OUTPUT_DIR}/codex-npm-${CODEX_VERSION}.tgz"
          echo "pack_output=$PACK_OUTPUT" >> "$GITHUB_OUTPUT"

      - name: Upload staged npm package artifact
        uses: actions/upload-artifact@v6
        if: ${{ github.repository == 'openai/codex' }}
        with:
          name: codex-npm-staging
          path: ${{ steps.stage_npm_package.outputs.pack_output }}

      - name: Ensure root README.md contains only ASCII and certain Unicode code points
        run: ./scripts/asciicheck.py README.md
      - name: Check root README ToC
        run: python3 scripts/readme_toc.py README.md

      - name: Ensure codex-cli/README.md contains only ASCII and certain Unicode code points
        run: ./scripts/asciicheck.py codex-cli/README.md
      - name: Check codex-cli/README ToC
        run: python3 scripts/readme_toc.py codex-cli/README.md

      - name: Prettier (run `pnpm run format:fix` to fix)
        run: pnpm run format

  installer-smoke:
    name: installer-smoke (${{ matrix.os }})
    needs: changed
    if: ${{ needs.changed.outputs.installer == 'true' }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Smoke test install.sh (local server)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail

          tmp="$(mktemp -d)"
          install_dir="${tmp}/bin"
          server_root="${tmp}/server"
          mkdir -p "$server_root"
          cp scripts/install.sh "${server_root}/install.sh"

          cat > "${server_root}/codex-x86_64-unknown-linux-gnu" <<'EOF'
          #!/usr/bin/env bash
          echo gnu
          EOF
          chmod +x "${server_root}/codex-x86_64-unknown-linux-gnu"
          cat > "${server_root}/codex-x86_64-unknown-linux-musl" <<'EOF'
          #!/usr/bin/env bash
          echo musl
          EOF
          chmod +x "${server_root}/codex-x86_64-unknown-linux-musl"

          port="$(python3 -c 'import socket; s=socket.socket(); s.bind(("127.0.0.1", 0)); print(s.getsockname()[1]); s.close()')"
          python3 -m http.server "$port" --bind 127.0.0.1 --directory "$server_root" >/dev/null 2>&1 &
          pid=$!
          trap 'kill "$pid" || true' EXIT

          for _ in {1..50}; do
            if curl -fsS "http://127.0.0.1:$port/" >/dev/null 2>&1; then
              break
            fi
            sleep 0.1
          done

          CODEX_BASE_URL="http://127.0.0.1:$port" INSTALL_DIR="$install_dir" bash -c "curl -fsSL http://127.0.0.1:$port/install.sh | bash"
          test -x "${install_dir}/codex"
          [[ "$("${install_dir}/codex")" == "gnu" ]]

      - name: Smoke test install.ps1 (local server)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'

          $target = 'x86_64-pc-windows-msvc'
          $tempRoot = Join-Path $env:RUNNER_TEMP ("codex-installer-" + [System.Guid]::NewGuid().ToString())
          $assetsDir = Join-Path $tempRoot 'assets'
          $installDir = Join-Path $tempRoot 'install'

          New-Item -ItemType Directory -Path $assetsDir -Force | Out-Null
          New-Item -ItemType Directory -Path $installDir -Force | Out-Null

          Set-Content -Path (Join-Path $assetsDir "codex-$target.exe") -Value "dummy" -NoNewline
          Set-Content -Path (Join-Path $assetsDir "codex-command-runner.exe") -Value "dummy" -NoNewline
          Set-Content -Path (Join-Path $assetsDir "codex-windows-sandbox-setup.exe") -Value "dummy" -NoNewline
          Copy-Item scripts/install.ps1 (Join-Path $assetsDir "install.ps1") -Force

          $zipPath = Join-Path $assetsDir "codex-$target.exe.zip"
          if (Test-Path $zipPath) { Remove-Item -Force $zipPath }
          Push-Location $assetsDir
          Compress-Archive -Path @("codex-$target.exe", "codex-command-runner.exe", "codex-windows-sandbox-setup.exe") -DestinationPath $zipPath -Force
          Pop-Location

          $listener = [System.Net.Sockets.TcpListener]::new([System.Net.IPAddress]::Loopback, 0)
          $listener.Start()
          $port = $listener.LocalEndpoint.Port
          $listener.Stop()
          $server = Start-Process -FilePath python -ArgumentList @("-m", "http.server", "$port", "--bind", "127.0.0.1", "--directory", "$assetsDir") -PassThru -NoNewWindow
          try {
            for ($i = 0; $i -lt 50; $i++) {
              try {
                Invoke-WebRequest -Uri "http://127.0.0.1:$port/" -UseBasicParsing | Out-Null
                break
              } catch {
                Start-Sleep -Milliseconds 100
              }
            }

            $env:CODEX_BASE_URL = "http://127.0.0.1:$port"
            $env:INSTALL_DIR = $installDir
            irm "http://127.0.0.1:$port/install.ps1" | iex

            if (!(Test-Path (Join-Path $installDir "codex.exe"))) { throw "codex.exe not installed" }
            if (!(Test-Path (Join-Path $installDir "codex-command-runner.exe"))) { throw "codex-command-runner.exe not installed" }
            if (!(Test-Path (Join-Path $installDir "codex-windows-sandbox-setup.exe"))) { throw "codex-windows-sandbox-setup.exe not installed" }
          } finally {
            try { if ($server -and -not $server.HasExited) { $server.Kill() } } catch {}
            if (Test-Path $tempRoot) { Remove-Item -Recurse -Force $tempRoot }
          }

  hodexctl-install-smoke:
    name: hodexctl-install-smoke (${{ matrix.os }})
    needs: changed
    if: ${{ needs.changed.outputs.hodexctl == 'true' }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Smoke test hodexctl.sh (local server)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail

          tmp="$(mktemp -d)"
          state_dir="${tmp}/state"
          command_dir="${tmp}/commands"
          server_root="${tmp}/server"
          mkdir -p "${server_root}/latest/download"

          case "$(uname -s):$(uname -m)" in
            Darwin:arm64)
              asset_name="codex-aarch64-apple-darwin"
              ;;
            Darwin:x86_64)
              asset_name="codex-x86_64-apple-darwin"
              ;;
            Linux:aarch64|Linux:arm64)
              gnu_asset_name="codex-aarch64-unknown-linux-gnu"
              musl_asset_name="codex-aarch64-unknown-linux-musl"
              ;;
            Linux:x86_64|Linux:amd64)
              gnu_asset_name="codex-x86_64-unknown-linux-gnu"
              musl_asset_name="codex-x86_64-unknown-linux-musl"
              ;;
            *)
              echo "Unsupported runner platform: $(uname -s) $(uname -m)" >&2
              exit 1
              ;;
          esac

          if [[ -n "${gnu_asset_name:-}" ]]; then
            cat <<'EOF' > "${server_root}/latest/download/${gnu_asset_name}"
          #!/usr/bin/env bash
          if [[ "${1:-}" == "--version" ]]; then
            echo "codex-cli 9.9.9-gnu"
            exit 0
          fi
          echo "gnu"
          EOF
            chmod +x "${server_root}/latest/download/${gnu_asset_name}"

            cat <<'EOF' > "${server_root}/latest/download/${musl_asset_name}"
          #!/usr/bin/env bash
          if [[ "${1:-}" == "--version" ]]; then
            echo "codex-cli 9.9.9-musl"
            exit 0
          fi
          echo "musl"
          EOF
            chmod +x "${server_root}/latest/download/${musl_asset_name}"
          else
            cat <<'EOF' > "${server_root}/latest/download/${asset_name}"
          #!/usr/bin/env bash
          if [[ "${1:-}" == "--version" ]]; then
            echo "codex-cli 9.9.9"
            exit 0
          fi
          echo "dummy"
          EOF
            chmod +x "${server_root}/latest/download/${asset_name}"
          fi

          port="$(python3 -c 'import socket; s=socket.socket(); s.bind(("127.0.0.1", 0)); print(s.getsockname()[1]); s.close()')"
          python3 -m http.server "$port" --bind 127.0.0.1 --directory "$server_root" >/dev/null 2>&1 &
          pid=$!
          trap 'kill "$pid" >/dev/null 2>&1 || true; wait "$pid" 2>/dev/null || true' EXIT

          for _ in {1..50}; do
            if curl -fsS "http://127.0.0.1:$port/" >/dev/null 2>&1; then
              break
            fi
            sleep 0.1
          done

          HODEX_RELEASE_BASE_URL="http://127.0.0.1:$port" \
            bash scripts/hodexctl/hodexctl.sh install \
              --yes \
              --no-path-update \
              --state-dir "$state_dir" \
              --command-dir "$command_dir"

          test -x "${state_dir}/bin/codex"
          test -x "${state_dir}/libexec/hodexctl.sh"
          test -x "${command_dir}/hodex"
          test -x "${command_dir}/hodexctl"
          if [[ "${RUNNER_OS}" == "Linux" ]]; then
            [[ "$("${state_dir}/bin/codex" --version)" == "codex-cli 9.9.9-gnu" ]]
          fi

          HODEX_RELEASE_BASE_URL="http://127.0.0.1:$port" \
            bash scripts/hodexctl/hodexctl.sh uninstall \
              --state-dir "$state_dir"

          test ! -e "${command_dir}/hodex"
          test ! -e "${command_dir}/hodexctl"
          test ! -e "${state_dir}/state.json"

      - name: Smoke test hodexctl.ps1 (local server)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'

          $target = 'x86_64-pc-windows-msvc'
          $tempRoot = Join-Path $env:RUNNER_TEMP ("hodexctl-smoke-" + [System.Guid]::NewGuid().ToString())
          $assetsDir = Join-Path $tempRoot 'assets'
          $releaseDir = Join-Path $assetsDir 'latest\download'
          $stateDir = Join-Path $tempRoot 'state'
          $commandDir = Join-Path $tempRoot 'commands'

          New-Item -ItemType Directory -Path $releaseDir -Force | Out-Null
          New-Item -ItemType Directory -Path $stateDir -Force | Out-Null
          New-Item -ItemType Directory -Path $commandDir -Force | Out-Null

          $sourceExe = (Get-Command pwsh).Source
          Copy-Item $sourceExe (Join-Path $releaseDir "codex-$target.exe") -Force
          Copy-Item $sourceExe (Join-Path $releaseDir "codex-command-runner.exe") -Force
          Copy-Item $sourceExe (Join-Path $releaseDir "codex-windows-sandbox-setup.exe") -Force

          $zipPath = Join-Path $releaseDir "codex-$target.exe.zip"
          if (Test-Path $zipPath) { Remove-Item -Force $zipPath }
          Push-Location $releaseDir
          Compress-Archive -Path @("codex-$target.exe", "codex-command-runner.exe", "codex-windows-sandbox-setup.exe") -DestinationPath $zipPath -Force
          Pop-Location

          $listener = [System.Net.Sockets.TcpListener]::new([System.Net.IPAddress]::Loopback, 0)
          $listener.Start()
          $port = $listener.LocalEndpoint.Port
          $listener.Stop()
          $server = Start-Process -FilePath python -ArgumentList @("-m", "http.server", "$port", "--bind", "127.0.0.1", "--directory", "$assetsDir") -PassThru -NoNewWindow
          try {
            for ($i = 0; $i -lt 50; $i++) {
              try {
                Invoke-WebRequest -Uri "http://127.0.0.1:$port/" -UseBasicParsing | Out-Null
                break
              } catch {
                Start-Sleep -Milliseconds 100
              }
            }

            $env:HODEX_RELEASE_BASE_URL = "http://127.0.0.1:$port"
            & pwsh -NoProfile -File scripts/hodexctl/hodexctl.ps1 install -Yes -NoPathUpdate -StateDir $stateDir -CommandDir $commandDir

            if (!(Test-Path (Join-Path $stateDir "bin\codex.exe"))) { throw "codex.exe not installed" }
            if (!(Test-Path (Join-Path $stateDir "bin\codex-command-runner.exe"))) { throw "codex-command-runner.exe not installed" }
            if (!(Test-Path (Join-Path $stateDir "bin\codex-windows-sandbox-setup.exe"))) { throw "codex-windows-sandbox-setup.exe not installed" }
            if (!(Test-Path (Join-Path $stateDir "libexec\hodexctl.ps1"))) { throw "hodexctl.ps1 not installed" }
            if (!(Test-Path (Join-Path $commandDir "hodex.cmd"))) { throw "hodex.cmd not installed" }
            if (!(Test-Path (Join-Path $commandDir "hodexctl.cmd"))) { throw "hodexctl.cmd not installed" }

            & pwsh -NoProfile -File scripts/hodexctl/hodexctl.ps1 uninstall -StateDir $stateDir

            if (Test-Path (Join-Path $commandDir "hodex.cmd")) { throw "hodex.cmd not removed" }
            if (Test-Path (Join-Path $commandDir "hodexctl.cmd")) { throw "hodexctl.cmd not removed" }
            if (Test-Path (Join-Path $stateDir "state.json")) { throw "state.json not removed" }
            if (Test-Path (Join-Path $stateDir "bin\codex-command-runner.exe")) { throw "codex-command-runner.exe not removed" }
            if (Test-Path (Join-Path $stateDir "bin\codex-windows-sandbox-setup.exe")) { throw "codex-windows-sandbox-setup.exe not removed" }
          } finally {
            try { if ($server -and -not $server.HasExited) { $server.Kill() } } catch {}
            if (Test-Path $tempRoot) { Remove-Item -Recurse -Force $tempRoot }
          }

  hodexctl-bootstrap-smoke:
    name: hodexctl-bootstrap-smoke (${{ matrix.os }})
    needs: changed
    if: ${{ needs.changed.outputs.hodexctl == 'true' }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Smoke test install-hodexctl.sh (local server)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail

          tmp="$(mktemp -d)"
          home_dir="${tmp}/home"
          state_dir="${tmp}/state"
          server_root="${tmp}/server"
          repo_path="demo/repo/main/scripts/hodexctl"

          mkdir -p "${home_dir}" "${server_root}/${repo_path}"
          cp scripts/install-hodexctl.sh "${server_root}/install-hodexctl.sh"
          cp scripts/hodexctl/hodexctl.sh "${server_root}/${repo_path}/hodexctl.sh"

          port="$(python3 -c 'import socket; s=socket.socket(); s.bind(("127.0.0.1", 0)); print(s.getsockname()[1]); s.close()')"
          python3 -m http.server "$port" --bind 127.0.0.1 --directory "$server_root" >/dev/null 2>&1 &
          pid=$!
          trap 'kill "$pid" || true; rm -rf "$tmp"' EXIT

          for _ in {1..50}; do
            if curl -fsS "http://127.0.0.1:$port/" >/dev/null 2>&1; then
              break
            fi
            sleep 0.1
          done

          export HOME="$home_dir"
          export HODEX_STATE_DIR="$state_dir"
          export HODEXCTL_REPO="demo/repo"
          export HODEX_CONTROLLER_URL_BASE="http://127.0.0.1:$port"
          curl -fsSL "http://127.0.0.1:$port/install-hodexctl.sh" | bash

          test -f "${state_dir}/libexec/hodexctl.sh"
          test -x "${state_dir}/commands/hodexctl"
          unset HODEX_STATE_DIR HODEXCTL_REPO HODEX_CONTROLLER_URL_BASE
          "${state_dir}/commands/hodexctl" status | grep -F "State dir: ${state_dir}"

      - name: Smoke test install-hodexctl.ps1 (local server)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'

          $tempRoot = Join-Path $env:RUNNER_TEMP ("hodexctl-bootstrap-" + [System.Guid]::NewGuid().ToString())
          $homeDir = Join-Path $tempRoot 'home'
          $stateDir = Join-Path $tempRoot 'state'
          $serverRoot = Join-Path $tempRoot 'server'
          $repoPath = Join-Path $serverRoot 'demo\repo\main\scripts\hodexctl'

          New-Item -ItemType Directory -Path $homeDir -Force | Out-Null
          New-Item -ItemType Directory -Path $repoPath -Force | Out-Null
          Copy-Item scripts\install-hodexctl.ps1 (Join-Path $serverRoot 'install-hodexctl.ps1') -Force
          Copy-Item scripts\hodexctl\hodexctl.ps1 (Join-Path $repoPath 'hodexctl.ps1') -Force

          $listener = [System.Net.Sockets.TcpListener]::new([System.Net.IPAddress]::Loopback, 0)
          $listener.Start()
          $port = $listener.LocalEndpoint.Port
          $listener.Stop()
          $server = Start-Process -FilePath python -ArgumentList @("-m", "http.server", "$port", "--bind", "127.0.0.1", "--directory", "$serverRoot") -PassThru -NoNewWindow
          try {
            for ($i = 0; $i -lt 50; $i++) {
              try {
                Invoke-WebRequest -Uri "http://127.0.0.1:$port/" -UseBasicParsing | Out-Null
                break
              } catch {
                Start-Sleep -Milliseconds 100
              }
            }

            $env:HODEX_STATE_DIR = $stateDir
            $env:HODEXCTL_REPO = 'demo/repo'
            $env:HODEX_CONTROLLER_URL_BASE = "http://127.0.0.1:$port"
            $env:HODEXCTL_NO_PATH_UPDATE = '1'

            irm "http://127.0.0.1:$port/install-hodexctl.ps1" | iex

            $controllerCopy = Join-Path $stateDir 'libexec\hodexctl.ps1'
            $wrapper = Join-Path $stateDir 'commands\hodexctl.ps1'
            if (!(Test-Path $controllerCopy)) { throw "hodexctl controller not installed" }
            if (!(Test-Path $wrapper)) { throw "hodexctl wrapper not installed" }

            Remove-Item Env:\HODEX_STATE_DIR -ErrorAction SilentlyContinue
            Remove-Item Env:\HODEXCTL_REPO -ErrorAction SilentlyContinue
            Remove-Item Env:\HODEX_CONTROLLER_URL_BASE -ErrorAction SilentlyContinue
            Remove-Item Env:\HODEXCTL_NO_PATH_UPDATE -ErrorAction SilentlyContinue

            & $wrapper relink
            if (!(Test-Path $controllerCopy)) { throw "hodexctl controller missing after wrapper relink" }
            if (!(Test-Path $wrapper)) { throw "hodexctl wrapper missing after wrapper relink" }

            & $wrapper uninstall
            if (Test-Path $controllerCopy) { throw "hodexctl controller not removed by wrapper uninstall" }
            if (Test-Path $wrapper) { throw "hodexctl wrapper not removed by wrapper uninstall" }
            if (Test-Path (Join-Path $stateDir 'state.json')) { throw "wrapper uninstall did not remove custom state dir" }
          } finally {
            Remove-Item Env:\HODEX_STATE_DIR -ErrorAction SilentlyContinue
            Remove-Item Env:\HODEXCTL_REPO -ErrorAction SilentlyContinue
            Remove-Item Env:\HODEX_CONTROLLER_URL_BASE -ErrorAction SilentlyContinue
            Remove-Item Env:\HODEXCTL_NO_PATH_UPDATE -ErrorAction SilentlyContinue
            try { if ($server -and -not $server.HasExited) { $server.Kill() } } catch {}
            if (Test-Path $tempRoot) { Remove-Item -Recurse -Force $tempRoot }
          }

  hodexctl-script-smoke:
    name: hodexctl-script-smoke (${{ matrix.os }})
    needs: changed
    if: ${{ needs.changed.outputs.hodexctl == 'true' }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Run hodexctl.sh smoke
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/hodexctl/hodexctl-smoke.sh

      - name: Run hodexctl.ps1 smoke
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          & pwsh -NoProfile -File scripts/hodexctl/hodexctl-smoke.ps1
